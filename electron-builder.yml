appId: it.resolve.nexus
productName: Nexus
copyright: © Nexus

directories:
  output: dist-app
  buildResources: build

# The Electron main process needs no third-party deps, so the asar is just the
# compiled main + preload + splash. The backend/daemon/frontend ship OUTSIDE the
# asar (extraResources) because the backend & daemon run under an external Node
# that cannot read an asar archive.
asar: true
# The main process uses no native modules (they ship in .stage/services), so
# skip @electron/rebuild — it would otherwise flip the root better-sqlite3 to
# Electron's ABI and break the system-node dev flow until the predev guard heals it.
npmRebuild: false
files:
  - electron/dist/**/*
  - electron/preload.js
  - electron/splash.html
  - package.json

extraResources:
  - from: .stage/services
    to: services
  - from: .stage/node
    to: node

afterPack: scripts/after-pack.cjs

mac:
  category: public.app-category.developer-tools
  target:
    - dir
  # Unsigned local builds for now. For a distributable, switch target to dmg,
  # set hardenedRuntime: true, and provide signing identity + notarization.
  hardenedRuntime: false
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist

win:
  target:
    - dir

linux:
  target:
    - dir
  category: Development
