version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:30"
      timezone: Europe/London
    open-pull-requests-limit: 3
    commit-message:
      prefix: deps
      include: scope
    labels:
      - dependencies
    groups:
      pi-runtime:
        patterns:
          - "@earendil-works/pi-*"
          - "@blackbelt-technology/pi-anthropic-messages"
        update-types:
          - minor
          - patch
      routine-updates:
        patterns:
          - "*"
        exclude-patterns:
          - "@earendil-works/pi-*"
          - "@blackbelt-technology/pi-anthropic-messages"
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /src/glasses
    schedule:
      interval: weekly
      day: monday
      time: "07:30"
      timezone: Europe/London
    open-pull-requests-limit: 3
    commit-message:
      prefix: deps
      include: scope
    labels:
      - dependencies
    ignore:
      # @evenrealities/evenhub-cli declares `typescript: ^5` as a peer, so TS 6+
      # breaks `npm install` here. Bumped and reverted once already (#195, #206).
      - dependency-name: typescript
        versions: [">=6"]
    groups:
      routine-updates:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /src/memory-daemon
    schedule:
      interval: weekly
      day: monday
      time: "07:30"
      timezone: Europe/London
    open-pull-requests-limit: 3
    commit-message:
      prefix: deps
      include: scope
    labels:
      - dependencies
    groups:
      routine-updates:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:30"
      timezone: Europe/London
    open-pull-requests-limit: 3
    commit-message:
      prefix: deps
      include: scope
    labels:
      - dependencies
    groups:
      routine-updates:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
