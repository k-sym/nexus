version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Europe/London
    open-pull-requests-limit: 3
    commit-message:
      prefix: deps
      include: scope
    labels:
      - dependencies
      - pi
    allow:
      - dependency-name: "@earendil-works/pi-agent-core"
      - dependency-name: "@earendil-works/pi-ai"
      - dependency-name: "@earendil-works/pi-coding-agent"
      - dependency-name: "@blackbelt-technology/pi-anthropic-messages"
    groups:
      pi-runtime:
        patterns:
          - "@earendil-works/pi-*"
          - "@blackbelt-technology/pi-anthropic-messages"
